<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACEBA Admin: Dashboard</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <a class="admin-brand" href="../index.html">
          <img src="../assets/logos/aceba.png" alt="Logo ACEBA" />
        </a>
        <nav class="admin-nav" aria-label="Menu administrativo">
          <button class="admin-nav-item is-active" type="button" data-section="partners">Parceiros</button>
          <button class="admin-nav-item" type="button" data-section="projects">Projetos</button>
          <button class="admin-nav-item" type="button" data-section="gallery_images">Galeria</button>
          <button class="admin-nav-item" type="button" data-section="transparency_documents">Transparência</button>
          <button class="admin-nav-item" type="button" data-section="site_settings">Configurações</button>
        </nav>
        <button id="logoutButton" class="admin-logout" type="button">Sair</button>
      </aside>

      <main class="admin-main">
        <header class="admin-topbar">
          <div>
            <p class="admin-kicker">Painel institucional</p>
            <h1 id="sectionTitle">Parceiros</h1>
          </div>
          <p id="sessionEmail" class="session-email"></p>
        </header>

        <section class="admin-content">
          <form id="recordForm" class="admin-form admin-editor"></form>
          <div class="admin-list-shell">
            <div class="list-head">
              <h2 id="listTitle">Registros</h2>
              <p id="adminStatus" class="admin-status" role="status"></p>
            </div>
            <div id="recordsList" class="records-list"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
