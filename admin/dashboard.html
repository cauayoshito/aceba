<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACEBA · Painel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body class="admin-page">

  <div class="admin-shell">

    <!-- ══════════════════ SIDEBAR ══════════════════ -->
    <aside class="admin-sidebar" aria-label="Navegação administrativa">

      <!-- Logo + badge -->
      <div class="sidebar-header">
        <a href="../index.html" class="sidebar-brand" title="Voltar ao site">
          <img src="../assets/logos/aceba.png" alt="Logo ACEBA" />
        </a>
        <span class="sidebar-badge">
          <span class="sidebar-badge-dot"></span>
          PAINEL ADMIN
        </span>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav" aria-label="Menu administrativo">

        <p class="nav-group-label">MENU</p>

        <button type="button" class="nav-item is-active" data-section="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="nav-label">Início</span>
        </button>

        <p class="nav-group-label">CONTEÚDO</p>

        <button type="button" class="nav-item" data-section="partners">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <span class="nav-label">Parcerias</span>
          <span class="nav-count" data-count="partners">0</span>
        </button>

        <button type="button" class="nav-item" data-section="news">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="nav-label">Notícias</span>
          <span class="nav-count" data-count="news">0</span>
        </button>

        <button type="button" class="nav-item" data-section="gallery_images">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="nav-label">Galeria</span>
          <span class="nav-count" data-count="gallery_images">0</span>
        </button>

        <button type="button" class="nav-item" data-section="site_settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="4"  y1="21" x2="4"  y2="14"/>
            <line x1="4"  y1="10" x2="4"  y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/>
            <line x1="12" y1="8"  x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1"  y1="14" x2="7"  y2="14"/>
            <line x1="9"  y1="8"  x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
          <span class="nav-label">Configurações</span>
        </button>

      </nav>

      <!-- User + logout -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="user-info">
            <p id="sessionEmail" class="user-email">–</p>
            <span class="user-role">Administrador</span>
          </div>
        </div>
        <button id="logoutButton" type="button" class="sidebar-logout">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sair da conta
        </button>
      </div>

    </aside>
    <!-- /sidebar -->

    <!-- ══════════════════ MAIN ══════════════════ -->
    <main class="admin-main">

      <header class="admin-topbar">
        <div>
          <h1 id="sectionTitle">Início</h1>
          <p id="sectionSubtitle" class="admin-subtitle">Visão geral do painel administrativo da ACEBA</p>
        </div>
        <div>
          <button id="primaryActionButton" type="button" class="admin-button is-hidden">+ Novo</button>
        </div>
      </header>

      <div id="adminToast" class="admin-toast" role="status" aria-live="polite"></div>

      <section id="adminContent" class="admin-content">
        <!-- Conteúdo dinâmico injetado por admin.js -->
      </section>

    </main>
    <!-- /main -->

  </div>

  <!-- ══════════════════ MODAL ══════════════════ -->
  <div id="adminModal" class="admin-modal" aria-hidden="true">
    <div class="admin-modal-backdrop" data-modal-close></div>
    <div class="admin-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
      <header class="admin-modal-head">
        <h2 id="adminModalTitle">Novo registro</h2>
        <button type="button" class="admin-modal-close" data-modal-close aria-label="Fechar">✕</button>
      </header>
      <form id="adminModalForm" class="admin-modal-body" novalidate></form>
      <footer class="admin-modal-foot">
        <button type="button" class="admin-button secondary" data-modal-close>Cancelar</button>
        <button type="button" class="admin-button" id="adminModalSubmit">Salvar</button>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="admin.js"></script>
  </body>
</html>
